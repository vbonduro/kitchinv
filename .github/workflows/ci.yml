name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["**"]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/vbonduro/kitchinv-dev:latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: ${{ runner.os }}-go-

      - name: golangci-lint
        run: golangci-lint run ./...

  vet:
    name: Vet
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/vbonduro/kitchinv-dev:latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: ${{ runner.os }}-go-

      - name: go vet
        run: go vet ./...

  staticcheck:
    name: Static Analysis
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/vbonduro/kitchinv-dev:latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: ${{ runner.os }}-go-

      - name: staticcheck
        run: staticcheck ./...

  govulncheck:
    name: Vulnerability Scan
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/vbonduro/kitchinv-dev:latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: ${{ runner.os }}-go-

      - name: govulncheck
        run: govulncheck ./...

  test:
    name: Test & Coverage
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/vbonduro/kitchinv-dev:latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: ${{ runner.os }}-go-

      - name: Run tests with coverage
        run: go test -race -count=1 -coverprofile=coverage.out -covermode=atomic ./...

      - name: Generate coverage report
        run: go tool cover -func=coverage.out

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.out
          retention-days: 7

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/vbonduro/kitchinv-dev:latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: ${{ runner.os }}-go-

      - name: Install e2e dependencies
        run: cd e2e && npm ci

      - name: Run E2E tests
        run: cd e2e && npx playwright test
        env:
          APP_PORT: '9090'
          OLLAMA_PORT: '19434'
          CI: 'true'
          PLAYWRIGHT_BROWSERS_PATH: /usr/local/ms-playwright

      - name: Upload traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: e2e/test-results/
          retention-days: 7
