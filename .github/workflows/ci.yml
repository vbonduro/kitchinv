name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["**"]

# Shared docker run flags used by all jobs
env:
  DOCKER_RUN: >-
    docker run --rm
    --user root
    -e GIT_CONFIG_COUNT=1
    -e GIT_CONFIG_KEY_0=safe.directory
    -e GIT_CONFIG_VALUE_0=*

jobs:
  prepare-image:
    name: Prepare CI Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if Dockerfile changed
        id: dockerfile-changed
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            if git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -q "^.devcontainer/Dockerfile$"; then
              echo "changed=true" >> "$GITHUB_OUTPUT"
            else
              echo "changed=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build image from Dockerfile
        if: steps.dockerfile-changed.outputs.changed == 'true'
        run: docker build -f .devcontainer/Dockerfile -t kitchinv-dev:ci .

      - name: Pull published image
        if: steps.dockerfile-changed.outputs.changed == 'false'
        run: |
          docker pull ghcr.io/vbonduro/kitchinv-dev:latest
          docker tag ghcr.io/vbonduro/kitchinv-dev:latest kitchinv-dev:ci

      - name: Save image as artifact
        run: docker save kitchinv-dev:ci | gzip > /tmp/kitchinv-dev.tar.gz

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: kitchinv-dev-image
          path: /tmp/kitchinv-dev.tar.gz
          retention-days: 1

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: prepare-image
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: kitchinv-dev-image
          path: /tmp
      - run: docker load < /tmp/kitchinv-dev.tar.gz
      - uses: actions/cache@v4
        with:
          path: ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: ${{ runner.os }}-go-
      - name: golangci-lint
        run: |
          ${{ env.DOCKER_RUN }} \
            -v "$GITHUB_WORKSPACE":/workspace \
            -v ~/.cache/go-build:/root/.cache/go-build \
            -w /workspace \
            kitchinv-dev:ci \
            golangci-lint run ./...

  vet:
    name: Vet
    runs-on: ubuntu-latest
    needs: prepare-image
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: kitchinv-dev-image
          path: /tmp
      - run: docker load < /tmp/kitchinv-dev.tar.gz
      - uses: actions/cache@v4
        with:
          path: ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: ${{ runner.os }}-go-
      - name: go vet
        run: |
          ${{ env.DOCKER_RUN }} \
            -v "$GITHUB_WORKSPACE":/workspace \
            -v ~/.cache/go-build:/root/.cache/go-build \
            -w /workspace \
            kitchinv-dev:ci \
            go vet ./...

  staticcheck:
    name: Static Analysis
    runs-on: ubuntu-latest
    needs: prepare-image
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: kitchinv-dev-image
          path: /tmp
      - run: docker load < /tmp/kitchinv-dev.tar.gz
      - uses: actions/cache@v4
        with:
          path: ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: ${{ runner.os }}-go-
      - name: staticcheck
        run: |
          ${{ env.DOCKER_RUN }} \
            -v "$GITHUB_WORKSPACE":/workspace \
            -v ~/.cache/go-build:/root/.cache/go-build \
            -w /workspace \
            kitchinv-dev:ci \
            staticcheck ./...

  govulncheck:
    name: Vulnerability Scan
    runs-on: ubuntu-latest
    needs: prepare-image
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: kitchinv-dev-image
          path: /tmp
      - run: docker load < /tmp/kitchinv-dev.tar.gz
      - uses: actions/cache@v4
        with:
          path: ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: ${{ runner.os }}-go-
      - name: govulncheck
        run: |
          ${{ env.DOCKER_RUN }} \
            -v "$GITHUB_WORKSPACE":/workspace \
            -v ~/.cache/go-build:/root/.cache/go-build \
            -w /workspace \
            kitchinv-dev:ci \
            govulncheck ./...

  test:
    name: Test & Coverage
    runs-on: ubuntu-latest
    needs: prepare-image
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: kitchinv-dev-image
          path: /tmp
      - run: docker load < /tmp/kitchinv-dev.tar.gz
      - uses: actions/cache@v4
        with:
          path: ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: ${{ runner.os }}-go-
      - name: Run tests with coverage
        run: |
          ${{ env.DOCKER_RUN }} \
            -v "$GITHUB_WORKSPACE":/workspace \
            -v ~/.cache/go-build:/root/.cache/go-build \
            -w /workspace \
            kitchinv-dev:ci \
            go test -race -count=1 -coverprofile=coverage.out -covermode=atomic ./...
      - name: Generate coverage report
        run: |
          ${{ env.DOCKER_RUN }} \
            -v "$GITHUB_WORKSPACE":/workspace \
            -w /workspace \
            kitchinv-dev:ci \
            go tool cover -func=coverage.out
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.out
          retention-days: 7

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: prepare-image
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: kitchinv-dev-image
          path: /tmp
      - run: docker load < /tmp/kitchinv-dev.tar.gz
      - uses: actions/cache@v4
        with:
          path: ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: ${{ runner.os }}-go-
      - name: Run E2E tests
        run: |
          ${{ env.DOCKER_RUN }} \
            -v "$GITHUB_WORKSPACE":/workspace \
            -v ~/.cache/go-build:/root/.cache/go-build \
            -w /workspace \
            -e APP_PORT=9090 \
            -e OLLAMA_PORT=19434 \
            -e CI=true \
            -e PLAYWRIGHT_BROWSERS_PATH=/usr/local/ms-playwright \
            kitchinv-dev:ci \
            bash -c "cd e2e && npm ci && npx playwright test"
      - name: Upload traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: e2e/test-results/
          retention-days: 7
